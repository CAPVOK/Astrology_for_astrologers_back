definitions:
  ds.Constellation:
    properties:
      confirmationDate:
        type: string
      creationDate:
        type: string
      endDate:
        type: string
      formationDate:
        type: string
      id:
        type: integer
      moderatorId:
        type: integer
      name:
        type: string
      planets:
        items:
          $ref: '#/definitions/ds.Planet'
        type: array
      startDate:
        type: string
      status:
        type: string
      userId:
        type: integer
    type: object
  ds.Credentials:
    properties:
      email:
        type: string
      password:
        items:
          type: integer
        type: array
    type: object
  ds.Planet:
    properties:
      color1:
        type: string
      color2:
        type: string
      constellations:
        items:
          $ref: '#/definitions/ds.Constellation'
        type: array
      discovered:
        type: string
      distance:
        type: string
      id:
        type: integer
      imageName:
        type: string
      info:
        type: string
      isActive:
        type: boolean
      mass:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: create user session and put it into cookie
      parameters:
      - description: user credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ds.Credentials'
      responses:
        "200":
          description: OK
          schema:
            properties:
              body:
                properties:
                  id:
                    type: integer
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
      summary: login user
      tags:
      - auth
  /auth/logout:
    post:
      description: delete current session and nullify cookie
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              err:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              err:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              err:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              err:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              err:
                type: string
            type: object
      summary: logout user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: add new user to db and return it id
      parameters:
      - description: user credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ds.Credentials'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              body:
                properties:
                  id:
                    type: integer
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
      summary: register user
      tags:
      - auth
  /constellation/:
    get:
      description: returns the list of constellations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              constellations:
                $ref: '#/definitions/ds.Constellation'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              ' message':
                type: string
              status:
                type: string
            type: object
      summary: returns the list of constellations
      tags:
      - expeditions
  /constellation/cancel/{id}:
    get:
      description: cancels the cancellation by id
      parameters:
      - description: id of constellation
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              constellations:
                $ref: '#/definitions/ds.Constellation'
              message:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
      summary: cancels the cancellation
      tags:
      - expeditions
swagger: "2.0"
